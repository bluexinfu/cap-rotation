name: update-data  # 每交易日盤後自動更新資料

on:
  schedule:
    # 同一交易日跑多個時段，涵蓋 TWSE 出表延遲；commit 只在資料有變動時發生，故重跑是冪等、零成本。
    # 時間為 UTC（台灣 = UTC+8）。
    - cron: '30 10 * * 1-5'   # 台灣 18:30（首次：盤後法人資料通常已公布）
    - cron: '0 13 * * 1-5'    # 台灣 21:00（補抓當晚較晚才出表的日子）
    - cron: '0 23 * * 1-5'    # 隔日台灣 07:00（週五的資料若拖到隔天，週六上午補回）
  workflow_dispatch:        # 也可在 Actions 頁手動執行

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build data.json
        run: python build_data.py
        env:
          NDAYS: '75'
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}   # TWSE T86 端點延遲時的備援來源（免費註冊取得）

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "資料無變動，略過 commit"
          else
            # commit 訊息用 data.json 內實際最新交易日，而非執行日，避免「跑了卻沒新增交易日」被誤判為已更新
            LATEST=$(python -c "import json;print(json.load(open('data.json'))['updated'])")
            git commit -m "data: update ${LATEST}"
            # 推送前先同步雲端：建置可能耗時 20+ 分，期間若有人改了 repo（或排程撞期），
            # 直接 push 會被拒而整批白做。改為 fetch + rebase 後再 push，並自動重試 3 次。
            BR="${GITHUB_REF_NAME:-master}"
            PUSHED=0
            for i in 1 2 3; do
              git fetch origin "$BR"
              git rebase "origin/$BR" || git rebase --abort 2>/dev/null || true
              if git push origin "HEAD:$BR"; then
                PUSHED=1; echo "推送成功（第 $i 次嘗試）"; break
              fi
              echo "推送被拒，已同步雲端後重試（第 $i 次）…"; sleep 5
            done
            if [ "$PUSHED" != "1" ]; then
              echo "::error::推送多次仍失敗，請檢查 repo 狀態"; exit 1
            fi
          fi
