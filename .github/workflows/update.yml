name: update-data  # 每交易日盤後自動更新資料

on:
  schedule:
    # 每週一到週五 UTC 10:30 = 台灣時間 18:30（盤後法人資料通常已公布）
    - cron: '30 10 * * 1-5'
  workflow_dispatch:        # 也可在 Actions 頁手動執行

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build data.json
        run: python build_data.py
        env:
          NDAYS: '75'

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "資料無變動，略過 commit"
          else
            git commit -m "data: update $(date -u +%Y-%m-%d)"
            git push
          fi
